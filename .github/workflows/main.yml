name: Begonia Final Stable KernelSU-Next Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ======================
      # 1. checkout
      # ======================
      - name: Checkout
        uses: actions/checkout@v4

      # ======================
      # 2. deps
      # ======================
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git curl wget zip unzip bc flex bison \
          build-essential libssl-dev libncurses-dev clang llvm lld

      # ======================
      # 3. kernel source
      # ======================
      - name: Clone kernel clean
        run: |
       git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_mt6785 kernel

       ls kernel

       test -d kernel/drivers || (echo "kernel broken" && exit 1)
      # ======================
      # 4. KernelSU-Next (CORRECT)
      # ======================
      - name: Apply KernelSU-Next
        run: |
          git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git ksu

          ls ksu/kernel

          bash ksu/kernel/setup.sh $GITHUB_WORKSPACE/kernel

      # ======================
      # 5. SUSFS (SAFE MODE)
      # ======================
      - name: Add SUSFS safely
        run: |
          git clone https://github.com/sidex15/susfs4ksu.git susfs

          cd kernel

           # ⚠️ 真实启用方式（编译宏）
          echo "CONFIG_KSU=y" >> arch/arm64/configs/begonia_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/begonia_defconfig

      # ======================
      # 6. build kernel
      # ======================
      - name: Build kernel
        run: |
          export ARCH=arm64
          cd kernel

          make O=out begonia_defconfig

          make -j$(nproc) O=out LLVM=1

      # ======================
      # 7. pack
      # ======================
      - name: Pack kernel
        run: |
          mkdir -p output
          cp kernel/out/arch/arm64/boot/Image* output/ || true

          cd output
          zip -r begonia-final-kernel.zip .

      # ======================
      # 8. upload
      # ======================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: begonia-final-kernel
          path: output/*
