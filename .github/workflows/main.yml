name: Begonia Stable Daily Kernel (KSU + SUSFS Lite)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ======================
      # checkout
      # ======================
      - name: Checkout
        uses: actions/checkout@v4

      # ======================
      # deps
      # ======================
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git curl wget zip unzip bc flex bison \
          build-essential libssl-dev libncurses-dev clang llvm lld

      # ======================
      # kernel source
      # ======================
      - name: Clone kernel
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_mt6785 kernel

      # ======================
      # KernelSU-Next (stable)
      # ======================
      - name: Apply KernelSU-Next
        run: |
          git clone --depth=1 https://github.com/KernelSU-Next/KernelSU-Next.git ksu
          bash ksu/kernel/setup.sh $GITHUB_WORKSPACE/kernel

      # ======================
      # SUSFS (LIGHT MODE ONLY)
      # ======================
      - name: Add SUSFS Lite
        run: |
          git clone https://github.com/sidex15/susfs4ksu.git susfs

          # 只做源码保留，不做强制patch
          mkdir -p kernel/susfs
          cp -r susfs/* kernel/susfs/

          echo "SUSFS Lite added (no hooks enabled)"

      # ======================
      # build
      # ======================
      - name: Build kernel
        run: |
          export ARCH=arm64
          cd kernel

          make O=out begonia_defconfig

          make -j$(nproc) O=out LLVM=1

      # ======================
      # pack
      # ======================
      - name: Pack kernel
        run: |
          mkdir out
          cp kernel/out/arch/arm64/boot/Image* out/ || true
          cd out
          zip -r begonia-stable-daily.zip .

      # ======================
      # upload
      # ======================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: begonia-stable-daily
          path: out/*
