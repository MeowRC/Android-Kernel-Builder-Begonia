name: Kernel Build (Begonia A14 KSU Next SUSFS)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. Checkout
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4

      # =========================
      # 2. Dependencies
      # =========================
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git curl wget zip unzip bc flex bison \
          build-essential libssl-dev libncurses-dev python3

      # =========================
      # 3. Clone kernel
      # =========================
      - name: Clone kernel source
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_mt6785 kernel

      # =========================
      # 4. KernelSU-Next
      # =========================
      - name: Apply KernelSU-Next
        run: |
          cd kernel
          curl -LSs https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/main/kernel/setup.sh | bash -

      # =========================
      # 5. SUSFS
      # =========================
      - name: Apply SUSFS
        run: |
          cd kernel
          git clone https://github.com/sidex15/susfs4ksu susfs

      # =========================
      # 6. clang toolchain
      # =========================
      - name: Setup clang
        run: |
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/main/clang-r547379.tar.gz
          mkdir clang
          tar -xf clang-r547379.tar.gz -C clang

      # =========================
      # 7. Build kernel
      # =========================
      - name: Build kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH=$PWD/clang/bin:$PATH

          cd kernel

          make O=out ARCH=arm64 begonia_defconfig

          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu-

      # =========================
      # 8. Pack output
      # =========================
      - name: Pack Image
        run: |
          mkdir -p output
          cp kernel/out/arch/arm64/boot/Image* output/ || true
          cd output
          zip -r Kernel-Begonia-KSU-SUSFS.zip .

      # =========================
      # 9. Upload artifact (FIXED v4)
      # =========================
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Begonia-Kernel
          path: output/*
