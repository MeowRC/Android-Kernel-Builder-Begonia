name: Kernel Build (Begonia A14)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          sudo apt update
          sudo apt install -y git curl wget zip unzip bc flex bison build-essential libssl-dev libncurses5-dev

      - name: Clone kernel source
        run: |
          git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_mt6785 kernel

      - name: Setup KernelSU-Next
        run: |
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/main/kernel/setup.sh" | bash -

      - name: Apply SUSFS patch
        run: |
          cd kernel
          git clone https://github.com/sidex15/susfs4ksu.git susfs
          echo "SUSFS cloned"

      - name: Setup clang
        run: |
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/main/clang-r547379.tar.gz
          mkdir clang
          tar -xf clang-r547379.tar.gz -C clang

      - name: Build kernel
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          export PATH=$PWD/clang/bin:$PATH

          cd kernel

          make O=out ARCH=arm64 begonia_defconfig

          make -j$(nproc) O=out \
            ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu-

      - name: Pack Image
        run: |
          mkdir -p output
          cp kernel/out/arch/arm64/boot/Image* output/ || true
          cd output
          zip -r Kernel-Begonia.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-Begonia-A14-KSU-SUSFS
          path: output/*
